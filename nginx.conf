server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Optional but useful for ALB/ECS health checks (no JS required)
  location = /healthy {
    add_header Content-Type text/plain;
    return 200 "OK\n";
  }

  # Serve static assets directly
  location /assets/ {
    try_files $uri =404;
  }

  # SPA fallback for React Router routes
  location / {
    try_files $uri $uri/ /index.html;
  }
}